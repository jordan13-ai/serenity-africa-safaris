# ─────────────────────────────────────────────────────────────────────────────
# Nginx Configuration — Serenity Africa Safaris
# Place at: /etc/nginx/sites-available/serenityafricasafaris.com
# Then: sudo ln -s /etc/nginx/sites-available/serenityafricasafaris.com \
#              /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────────────────────

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name serenityafricasafaris.com www.serenityafricasafaris.com;
    return 301 https://serenityafricasafaris.com$request_uri;
}

# Redirect www → non-www
server {
    listen 443 ssl http2;
    server_name www.serenityafricasafaris.com;
    ssl_certificate     /etc/letsencrypt/live/serenityafricasafaris.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/serenityafricasafaris.com/privkey.pem;
    return 301 https://serenityafricasafaris.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name serenityafricasafaris.com;

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/serenityafricasafaris.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/serenityafricasafaris.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/serenityafricasafaris.com/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Root & Logging ───────────────────────────────────────────────────────
    root /var/www/serenityafricasafaris/public;
    access_log /var/log/nginx/serenity-access.log;
    error_log  /var/log/nginx/serenity-error.log;

    # ── Limits ───────────────────────────────────────────────────────────────
    client_max_body_size 25M;
    limit_conn conn_limit 20;

    # ── Security Headers ─────────────────────────────────────────────────────
    # (Next.js adds these too; Nginx adds them for static assets)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Block .next internals ─────────────────────────────────────────────────
    location ~ /\.next/ {
        deny all;
        return 404;
    }
    location ~ /\.git {
        deny all;
        return 404;
    }
    location ~ /\.env {
        deny all;
        return 404;
    }

    # ── Static Assets (Next.js _next/static) ─────────────────────────────────
    location /_next/static/ {
        alias /var/www/serenityafricasafaris/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
    }

    # ── Public Images ─────────────────────────────────────────────────────────
    location /images/ {
        expires 7d;
        add_header Cache-Control "public, stale-while-revalidate=86400";
        try_files $uri =404;
        access_log off;
        gzip_static on;
    }

    # ── Uploaded files ────────────────────────────────────────────────────────
    location /uploads/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
        # No directory listing
        autoindex off;
    }

    # ── Favicon & robots ──────────────────────────────────────────────────────
    location = /favicon.ico { try_files $uri @nextjs; access_log off; }
    location = /robots.txt  { try_files $uri @nextjs; access_log off; }
    location = /sitemap.xml { try_files $uri @nextjs; access_log off; }

    # ── Rate-limit auth endpoint ──────────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    # ── Rate-limit file upload ────────────────────────────────────────────────
    location /api/admin/upload {
        limit_req zone=upload burst=3 nodelay;
        limit_req_status 429;
        client_max_body_size 25M;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    # ── Rate-limit general API ────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    # ── All other routes → Next.js ────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;

        # Required for Next.js SSR and WebSocket HMR (dev only)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Fallback ──────────────────────────────────────────────────────────────
    location @nextjs {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;
}
