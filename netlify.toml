# ──────────────────────────────────────────────────────────────
#  Serenity Africa Safaris — Netlify Configuration
#  NOTE: This app requires SSR (API routes, Prisma, NextAuth).
#  Use @netlify/plugin-nextjs which handles SSR via Edge Functions.
# ──────────────────────────────────────────────────────────────

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Block sensitive paths
[[headers]]
  for = "/.env*"
  [headers.values]
    X-Robots-Tag = "noindex"

# ── ENVIRONMENT VARIABLES ─────────────────────────────────────
# Set these in the Netlify dashboard → Site Settings → Environment variables:
#   DATABASE_URL
#   NEXTAUTH_SECRET
#   NEXTAUTH_URL=https://serenityafricasafaris.com
#   RESEND_API_KEY
#   CONTACT_FORM_RECEIVER
